[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=25,25,25,170

[Metadata]
Name=PC Stats Plus
Author=Codex
Information=Displays live system stats plus watchlist stocks and weather.
Version=1.3
License=MIT

[Variables]
FontName=Segoe UI
FontColor=235,235,235,255
SubFontColor=180,180,180,255
AccentColor=90,180,255,255
BarColor=90,180,255,220
BarBackgroundColor=60,60,60,180
TitleSize=16
LabelSize=10
ValueSize=11
LineHeight=22
SectionGap=10
Padding=12
ContentWidth=420
BarWidth=260
BarHeight=8

; Stock watchlist (predefined list)
Stock1Label=AAPL
Stock2Label=MSFT
Stock3Label=NVDA
StockSymbols=AAPL,MSFT,NVDA
StockApiUrl=https://query1.finance.yahoo.com/v7/finance/quote?symbols=#StockSymbols#

; Weather (wttr.in text endpoint, no API key required)
; Examples: New%20York, London, Tokyo
WeatherLocation=New%20York
WeatherUrl=https://wttr.in/#WeatherLocation#?format=%l:+%t,+%C,+Humidity+%h,+Wind+%w

; ----------------------------
; Measures
; ----------------------------
[MeasureCPU]
Measure=CPU
Processor=0
AverageSize=5

[MeasureRAMUsedBytes]
Measure=PhysicalMemory
Total=0
UpdateDivider=2

[MeasureRAMTotalBytes]
Measure=PhysicalMemory
Total=1
UpdateDivider=2

[MeasureRAMUsedPercent]
Measure=Calc
Formula=(MeasureRAMUsedBytes/MeasureRAMTotalBytes*100)
DynamicVariables=1

[MeasureRAMUsedGB]
Measure=Calc
Formula=(MeasureRAMUsedBytes/1073741824)
DynamicVariables=1

[MeasureRAMTotalGB]
Measure=Calc
Formula=(MeasureRAMTotalBytes/1073741824)
DynamicVariables=1

[MeasureDiskCUsedPercent]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1
IgnoreRemovable=1

[MeasureDiskCFreeRaw]
Measure=FreeDiskSpace
Drive=C:
IgnoreRemovable=1
Total=0

[MeasureDiskCTotalRaw]
Measure=FreeDiskSpace
Drive=C:
IgnoreRemovable=1
Total=1

[MeasureDiskCFreeGB]
Measure=Calc
Formula=(MeasureDiskCFreeRaw/1073741824)
DynamicVariables=1

[MeasureDiskCTotalGB]
Measure=Calc
Formula=(MeasureDiskCTotalRaw/1073741824)
DynamicVariables=1

[MeasureNetIn]
Measure=NetIn
Interface=Best

[MeasureNetOut]
Measure=NetOut
Interface=Best

[MeasureUptime]
Measure=Uptime
Format="%4!dd! %3!02d!:%2!02d!:%1!02d!"

; Yahoo Finance stock prices for the predefined symbol list above
[MeasureStocksRaw]
Measure=Plugin
Plugin=WebParser
Url=#StockApiUrl#
RegExp="(?siU).*?\"regularMarketPrice\":([0-9.]+).*?\"regularMarketPrice\":([0-9.]+).*?\"regularMarketPrice\":([0-9.]+).*"
UpdateRate=300
DynamicVariables=1

[MeasureStock1]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStocksRaw]
StringIndex=1
DynamicVariables=1

[MeasureStock2]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStocksRaw]
StringIndex=2
DynamicVariables=1

[MeasureStock3]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStocksRaw]
StringIndex=3
DynamicVariables=1

; Weather line pulled from wttr.in (plain text)
[MeasureWeatherRaw]
Measure=Plugin
Plugin=WebParser
Url=#WeatherUrl#
RegExp="(?siU)(.*)"
UpdateRate=600
DynamicVariables=1

[MeasureWeather]
Measure=Plugin
Plugin=WebParser
Url=[MeasureWeatherRaw]
StringIndex=1
DynamicVariables=1

; ----------------------------
; Layout
; ----------------------------
[MeterTitle]
Meter=String
X=#Padding#
Y=#Padding#
Text=PC STATS
FontFace=#FontName#
FontColor=#AccentColor#
FontSize=#TitleSize#
AntiAlias=1

[MeterCPULabel]
Meter=String
X=#Padding#
Y=(#Padding#+30)
Text=CPU [MeasureCPU:0.0]%
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterCPUBar]
Meter=Bar
MeasureName=MeasureCPU
X=#Padding#
Y=(#Padding#+48)
W=#BarWidth#
H=#BarHeight#
BarColor=#BarColor#
SolidColor=#BarBackgroundColor#
DynamicVariables=1

[MeterRAMLabel]
Meter=String
X=#Padding#
Y=(#Padding#+30+#LineHeight#+#SectionGap#)
Text=RAM [MeasureRAMUsedGB:0.0] / [MeasureRAMTotalGB:0.0] GB ([MeasureRAMUsedPercent:0]%)
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterRAMBar]
Meter=Bar
MeasureName=MeasureRAMUsedPercent
X=#Padding#
Y=(#Padding#+48+#LineHeight#+#SectionGap#)
W=#BarWidth#
H=#BarHeight#
BarColor=#BarColor#
SolidColor=#BarBackgroundColor#
DynamicVariables=1

[MeterDiskCLabel]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*2)+(#SectionGap#*2))
Text=Disk C [MeasureDiskCFreeGB:0.0] GB free / [MeasureDiskCTotalGB:0.0] GB total
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterDiskCBar]
Meter=Bar
MeasureName=MeasureDiskCUsedPercent
X=#Padding#
Y=(#Padding#+48+(#LineHeight#*2)+(#SectionGap#*2))
W=#BarWidth#
H=#BarHeight#
BarColor=#BarColor#
SolidColor=#BarBackgroundColor#
DynamicVariables=1

[MeterNetwork]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*3)+(#SectionGap#*3))
Text=Network  ↓ [MeasureNetIn:1B]/s   ↑ [MeasureNetOut:1B]/s
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterUptime]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*4)+(#SectionGap#*3))
Text=Uptime [MeasureUptime]
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterStocksHeader]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*5)+(#SectionGap#*3)+6)
Text=Watchlist
FontFace=#FontName#
FontColor=#AccentColor#
FontSize=#LabelSize#
AntiAlias=1

[MeterStock1]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*6)+(#SectionGap#*3)+6)
Text=#Stock1Label#  $[MeasureStock1]
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterStock2]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*7)+(#SectionGap#*3)+6)
Text=#Stock2Label#  $[MeasureStock2]
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterStock3]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*8)+(#SectionGap#*3)+6)
Text=#Stock3Label#  $[MeasureStock3]
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
DynamicVariables=1

[MeterWeatherHeader]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*9)+(#SectionGap#*3)+10)
Text=Weather
FontFace=#FontName#
FontColor=#AccentColor#
FontSize=#LabelSize#
AntiAlias=1

[MeterWeather]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*10)+(#SectionGap#*3)+10)
Text=[MeasureWeather]
FontFace=#FontName#
FontColor=#FontColor#
FontSize=#ValueSize#
AntiAlias=1
ClipString=1
W=#ContentWidth#
DynamicVariables=1

[MeterHint]
Meter=String
X=#Padding#
Y=(#Padding#+30+(#LineHeight#*11)+(#SectionGap#*3)+16)
Text=Tip: Edit StockSymbols / WeatherLocation in [Variables], then Refresh skin.
FontFace=#FontName#
FontColor=#SubFontColor#
FontSize=#LabelSize#
AntiAlias=1
ClipString=1
W=#ContentWidth#
