[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosStocksX#
WindowY=#PosStocksY#

[Metadata]
Name=Pro Command Center - Stocks
Author=Codex
Information=Minimal delayed watchlist panel via WebParser.
Version=1.1.0

[Variables]
@include=#@#Variables.inc
PanelHeight=208
ValueX=(#PanelWidth#-#PanelPadding#)

; Stooq CSV: SYMBOL,DATE,TIME,OPEN,HIGH,LOW,CLOSE,VOLUME
; We read CLOSE to keep the module minimal and resilient.
[MeasureStock1Raw]
Measure=Plugin
Plugin=WebParser
Url=#Stock1Url#
RegExp="(?siU).*?,.*?,.*?,.*?,.*?,.*?,([^,\r\n]+),.*"
UpdateRate=300
DynamicVariables=1

[MeasureStock1Close]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStock1Raw]
StringIndex=1

[MeasureStock2Raw]
Measure=Plugin
Plugin=WebParser
Url=#Stock2Url#
RegExp="(?siU).*?,.*?,.*?,.*?,.*?,.*?,([^,\r\n]+),.*"
UpdateRate=300
DynamicVariables=1

[MeasureStock2Close]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStock2Raw]
StringIndex=1

[MeasureStock3Raw]
Measure=Plugin
Plugin=WebParser
Url=#Stock3Url#
RegExp="(?siU).*?,.*?,.*?,.*?,.*?,.*?,([^,\r\n]+),.*"
UpdateRate=300
DynamicVariables=1

[MeasureStock3Close]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStock3Raw]
StringIndex=1

[MeasureStock4Raw]
Measure=Plugin
Plugin=WebParser
Url=#Stock4Url#
RegExp="(?siU).*?,.*?,.*?,.*?,.*?,.*?,([^,\r\n]+),.*"
UpdateRate=300
DynamicVariables=1

[MeasureStock4Close]
Measure=Plugin
Plugin=WebParser
Url=[MeasureStock4Raw]
StringIndex=1

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=WATCHLIST
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterHeaderSub]
Meter=String
X=(#PanelWidth#-#PanelPadding#)
Y=#PanelPadding#
Text=Delayed Close
StringAlign=Right
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleLabel]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[StyleValue]
Meter=String
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1
StringAlign=Right

[MeterStock1Label]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14)
Text=#Stock1Symbol#

[MeterStock1Value]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=$[MeasureStock1Close]

[MeterStock2Label]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*1))
Text=#Stock2Symbol#

[MeterStock2Value]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=$[MeasureStock2Close]

[MeterStock3Label]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*2))
Text=#Stock3Symbol#

[MeterStock3Value]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=$[MeasureStock3Close]

[MeterStock4Label]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*3))
Text=#Stock4Symbol#

[MeterStock4Value]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=$[MeasureStock4Close]

[MeterHint]
Meter=String
X=#PanelPadding#
Y=(#PanelHeight#-#PanelPadding#-14)
Text=Edit symbols in @Resources\\Variables.inc
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1
