[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosWeatherX#
WindowY=#PosWeatherY#

[Metadata]
Name=Pro Command Center - Weather
Author=Codex
Information=Minimal weather panel via wttr.in and WebParser.
Version=1.1.0

[Variables]
@include=#@#Variables.inc
PanelHeight=188
ValueX=(#PanelWidth#-#PanelPadding#)

; wttr fields: temperature | condition | high/low
[MeasureWeatherRaw]
Measure=Plugin
Plugin=WebParser
Url=#WeatherUrl#
RegExp="(?siU)([^|]+)\|([^|]+)\|([^|]+)"
UpdateRate=900
DynamicVariables=1

[MeasureWeatherTemp]
Measure=Plugin
Plugin=WebParser
Url=[MeasureWeatherRaw]
StringIndex=1

[MeasureWeatherCond]
Measure=Plugin
Plugin=WebParser
Url=[MeasureWeatherRaw]
StringIndex=2

[MeasureWeatherHighLow]
Measure=Plugin
Plugin=WebParser
Url=[MeasureWeatherRaw]
StringIndex=3

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=WEATHER
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterLocation]
Meter=String
X=(#PanelWidth#-#PanelPadding#)
Y=#PanelPadding#
Text=#WeatherLocation#
StringAlign=Right
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[MeterTemp]
Meter=String
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+10)
Text=[MeasureWeatherTemp]
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=24
AntiAlias=1

[MeterCond]
Meter=String
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+46)
Text=[MeasureWeatherCond]
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeValue#
AntiAlias=1

[MeterHighLowLabel]
Meter=String
X=#PanelPadding#
Y=(#PanelHeight#-#PanelPadding#-18)
Text=High / Low
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHighLowValue]
Meter=String
X=#ValueX#
Y=r
Text=[MeasureWeatherHighLow]
StringAlign=Right
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1
