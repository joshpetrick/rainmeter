[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosDashboardX#
WindowY=#PosDashboardY#

[Metadata]
Name=Pro Command Center - Launcher
Author=Codex
Information=Lightweight launcher for modular dashboard controls.
Version=1.1.1

[Variables]
@include=#@#Variables.inc
PanelWidthSmall=324
PanelHeightSmall=236

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidthSmall#,#PanelHeightSmall#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=PRO COMMAND CENTER
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterSub]
Meter=String
X=#PanelPadding#
Y=(#PanelPadding#+22)
Text=Independent module controls.
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidthSmall#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleButton]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
SolidColor=255,255,255,10
Padding=10,5,10,5
AntiAlias=1
MouseOverAction=[!SetOption #CURRENTSECTION# FontColor "#ThemeAccent#"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FontColor "#ThemeText#"][!UpdateMeter #CURRENTSECTION#][!Redraw]

[MeterLoadAll]
Meter=String
MeterStyle=StyleButton
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+12)
Text=Load All
LeftMouseUpAction=[!ActivateConfig "ProCommandCenter" "SystemStats.ini"][!ActivateConfig "ProCommandCenter" "SystemSpecs.ini"][!ActivateConfig "ProCommandCenter" "Weather.ini"][!ActivateConfig "ProCommandCenter" "Stocks.ini"]

[MeterUnloadAll]
Meter=String
MeterStyle=StyleButton
X=(#PanelPadding#+98)
Y=r
Text=Unload All
LeftMouseUpAction=[!DeactivateConfig "ProCommandCenter" "SystemStats.ini"][!DeactivateConfig "ProCommandCenter" "SystemSpecs.ini"][!DeactivateConfig "ProCommandCenter" "Weather.ini"][!DeactivateConfig "ProCommandCenter" "Stocks.ini"]

; Avoid !ToggleConfig here: explicit Load/Unload actions prevent accidental global unload behavior.
[MeterLoadStats]
Meter=String
MeterStyle=StyleButton
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+48)
Text=Load Stats
LeftMouseUpAction=[!ActivateConfig "ProCommandCenter" "SystemStats.ini"]

[MeterUnloadStats]
Meter=String
MeterStyle=StyleButton
X=(#PanelPadding#+98)
Y=r
Text=Unload Stats
LeftMouseUpAction=[!DeactivateConfig "ProCommandCenter" "SystemStats.ini"]

[MeterLoadSpecs]
Meter=String
MeterStyle=StyleButton
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+84)
Text=Load Specs
LeftMouseUpAction=[!ActivateConfig "ProCommandCenter" "SystemSpecs.ini"]

[MeterUnloadSpecs]
Meter=String
MeterStyle=StyleButton
X=(#PanelPadding#+98)
Y=r
Text=Unload Specs
LeftMouseUpAction=[!DeactivateConfig "ProCommandCenter" "SystemSpecs.ini"]

[MeterLoadWeather]
Meter=String
MeterStyle=StyleButton
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+120)
Text=Load Weather
LeftMouseUpAction=[!ActivateConfig "ProCommandCenter" "Weather.ini"]

[MeterUnloadWeather]
Meter=String
MeterStyle=StyleButton
X=(#PanelPadding#+98)
Y=r
Text=Unload Weather
LeftMouseUpAction=[!DeactivateConfig "ProCommandCenter" "Weather.ini"]

[MeterLoadStocks]
Meter=String
MeterStyle=StyleButton
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+156)
Text=Load Stocks
LeftMouseUpAction=[!ActivateConfig "ProCommandCenter" "Stocks.ini"]

[MeterUnloadStocks]
Meter=String
MeterStyle=StyleButton
X=(#PanelPadding#+98)
Y=r
Text=Unload Stocks
LeftMouseUpAction=[!DeactivateConfig "ProCommandCenter" "Stocks.ini"]
