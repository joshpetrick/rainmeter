[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=SYSTEM
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterHeaderSub]
Meter=String
X=(#PanelPadding#+64)
Y=#PanelPadding#
Text=RainmeterCollector Metrics
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleLabel]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[StyleValue]
Meter=String
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1

[MeterCPUHeadline]
Meter=String
MeterStyle=StyleValue
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+10)
Text=CPU: #CpuUsage# | #CpuTemp#
DynamicVariables=1

[MeterCPUCores]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+32)
W=(#PanelWidth#-(#PanelPadding#*2))
ClipString=2
Text=#CpuCoreLines#
DynamicVariables=1

[MeterGpuHeadline]
Meter=String
MeterStyle=StyleValue
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+264)
Text=GPU: #GpuName#
DynamicVariables=1

[MeterGpuStats]
Meter=String
