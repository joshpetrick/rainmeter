[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosStatsX#
WindowY=#PosStatsY#

[Metadata]
Name=Pro Command Center - System Stats
Author=Codex
Information=Minimal primary telemetry panel powered by RainmeterCollector metrics.json.
Version=1.2.0

[Variables]
@include=#@#Variables.inc
PanelHeight=288
ValueX=(#PanelWidth#-#PanelPadding#)

; ==========================================================
; Measures
; ==========================================================
[MeasureCpuRaw]
Measure=Plugin
Plugin=WebParser
Url=file:///#MetricsJsonPath#
RegExp="(?siU).*?\"cpu\"\s*:\s*\{.*?\"usageTotalPercent\"\s*:\s*([-0-9.]+|null).*?\"temperatureC\"\s*:\s*([-0-9.]+|null).*"
UpdateRate=1
DynamicVariables=1

[MeasureGpuRaw]
Measure=Plugin
Plugin=WebParser
Url=file:///#MetricsJsonPath#
RegExp="(?siU).*?\"gpu\"\s*:\s*\[\s*\{.*?\"usagePercent\"\s*:\s*([-0-9.]+|null).*?\"temperatureC\"\s*:\s*([-0-9.]+|null).*"
UpdateRate=1
DynamicVariables=1

[MeasureMemoryRaw]
Measure=Plugin
Plugin=WebParser
Url=file:///#MetricsJsonPath#
RegExp="(?siU).*?\"memory\"\s*:\s*\{.*?\"totalMB\"\s*:\s*([-0-9.]+|null).*?\"usedMB\"\s*:\s*([-0-9.]+|null).*?\"usagePercent\"\s*:\s*([-0-9.]+|null).*"
UpdateRate=1
DynamicVariables=1

[MeasureDiskRaw]
Measure=Plugin
Plugin=WebParser
Url=file:///#MetricsJsonPath#
RegExp="(?siU).*?\"disks\"\s*:\s*\[.*?\"mountPoint\"\s*:\s*\"#PrimaryDrive#\\\\\".*?\"usagePercent\"\s*:\s*([-0-9.]+|null).*"
UpdateRate=1
DynamicVariables=1

[MeasureNetworkRaw]
Measure=Plugin
Plugin=WebParser
Url=file:///#MetricsJsonPath#
RegExp="(?siU).*?\"network\"\s*:\s*\[\s*\{.*?\"bytesSentPerSec\"\s*:\s*([-0-9.]+|null).*?\"bytesReceivedPerSec\"\s*:\s*([-0-9.]+|null).*"
UpdateRate=1
DynamicVariables=1

[MeasureCPUUsage]
Measure=Plugin
Plugin=WebParser
Url=[MeasureCpuRaw]
StringIndex=1
Substitute="null":"0"
DynamicVariables=1

[MeasureCPUTemp]
Measure=Plugin
Plugin=WebParser
Url=[MeasureCpuRaw]
StringIndex=2
Substitute="null":"0"
DynamicVariables=1

[MeasureGPUUsage]
Measure=Plugin
Plugin=WebParser
Url=[MeasureGpuRaw]
StringIndex=1
Substitute="null":"0"
DynamicVariables=1

[MeasureGPUTemp]
Measure=Plugin
Plugin=WebParser
Url=[MeasureGpuRaw]
StringIndex=2
Substitute="null":"0"
DynamicVariables=1

[MeasureRAMUsedMB]
Measure=Plugin
Plugin=WebParser
Url=[MeasureMemoryRaw]
StringIndex=2
Substitute="null":"0"
DynamicVariables=1

[MeasureRAMTotalMB]
Measure=Plugin
Plugin=WebParser
Url=[MeasureMemoryRaw]
StringIndex=1
Substitute="null":"0"
DynamicVariables=1

[MeasureRAMPercent]
Measure=Plugin
Plugin=WebParser
Url=[MeasureMemoryRaw]
StringIndex=3
Substitute="null":"0"
DynamicVariables=1

[MeasureDriveUsed]
Measure=Plugin
Plugin=WebParser
Url=[MeasureDiskRaw]
StringIndex=1
Substitute="null":"0"
DynamicVariables=1

[MeasureNetIn]
Measure=Plugin
Plugin=WebParser
Url=[MeasureNetworkRaw]
StringIndex=2
Substitute="null":"0"
DynamicVariables=1

[MeasureNetOut]
Measure=Plugin
Plugin=WebParser
Url=[MeasureNetworkRaw]
StringIndex=1
Substitute="null":"0"
DynamicVariables=1

[MeasureRAMUsedGB]
Measure=Calc
Formula=(MeasureRAMUsedMB/1024)
DynamicVariables=1

[MeasureRAMTotalGB]
Measure=Calc
Formula=(MeasureRAMTotalMB/1024)
DynamicVariables=1

; ==========================================================
; Panel frame and shared styles
; ==========================================================
[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=SYSTEM
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterHeaderSub]
Meter=String
X=(#PanelPadding#+64)
Y=#PanelPadding#
Text=Performance Overview
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleLabel]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[StyleValue]
Meter=String
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1
StringAlign=Right

; ==========================================================
; Rows (consistent spacing/alignment)
; ==========================================================
[MeterCPUUsageLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14)
Text=CPU Usage

[MeterCPUUsageValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureCPUUsage:0]%

[MeterCPUTempLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*1))
Text=CPU Temperature

[MeterCPUTempValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureCPUTemp:0]°C
DynamicVariables=1

[MeterGPUUsageLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*2))
Text=GPU Usage

[MeterGPUUsageValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureGPUUsage:0]%
DynamicVariables=1

[MeterGPUTempLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*3))
Text=GPU Temperature

[MeterGPUTempValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureGPUTemp:0]°C
DynamicVariables=1

[MeterRAMLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*4))
Text=Memory

[MeterRAMValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureRAMUsedGB:0.0] / [MeasureRAMTotalGB:0.0] GB  ([MeasureRAMPercent:0]%)
DynamicVariables=1

[MeterDriveLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*5))
Text=Drive #PrimaryDrive# Usage
DynamicVariables=1

[MeterDriveValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureDriveUsed:0]%

[MeterNetLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*6))
Text=Network Throughput

[MeterNetValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=↓ [MeasureNetIn:1B]/s   ↑ [MeasureNetOut:1B]/s
DynamicVariables=1

[MeterHint]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelHeight#-#PanelPadding#-14)
W=(#PanelWidth#-(#PanelPadding#*2))
ClipString=1
Text=Source: #MetricsJsonPath# (RainmeterCollector)
DynamicVariables=1
