[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosStatsX#
WindowY=#PosStatsY#

[Metadata]
Name=Pro Command Center - System Stats
Author=Codex
Information=Minimal primary telemetry panel. HWiNFO required for some sensors.
Version=1.1.0

[Variables]
@include=#@#Variables.inc
PanelHeight=288
ValueX=(#PanelWidth#-#PanelPadding#)

; ==========================================================
; Measures
; ==========================================================
[MeasureCPUUsage]
Measure=CPU
Processor=0

[MeasureRAMPercent]
Measure=PhysicalMemory

[MeasureRAMUsedGB]
Measure=PhysicalMemory
Total=0
Formula=(MeasureRAMTotalGB*(MeasureRAMPercent/100))
DynamicVariables=1

[MeasureRAMTotalGB]
Measure=PhysicalMemory
Total=1
Formula=(MeasureRAMTotalGB/1024/1024/1024)

[MeasureDriveUsed]
Measure=FreeDiskSpace
Drive=#PrimaryDrive#
InvertMeasure=1
IgnoreRemovable=1

[MeasureNetIn]
Measure=NetIn
Interface=Best

[MeasureNetOut]
Measure=NetOut
Interface=Best

; HWiNFO plugin measures (configure IDs in Variables.inc)
[MeasureCPUTemp]
Measure=Plugin
Plugin=HWiNFO
HWiNFOSensorId=#HWiNFOCpuTempSensorId#
HWiNFOEntryId=#HWiNFOCpuTempEntryId#
HWiNFOType=CurrentValue
DynamicVariables=1

[MeasureGPUUsage]
Measure=Plugin
Plugin=HWiNFO
HWiNFOSensorId=#HWiNFOGpuUsageSensorId#
HWiNFOEntryId=#HWiNFOGpuUsageEntryId#
HWiNFOType=CurrentValue
DynamicVariables=1

[MeasureGPUTemp]
Measure=Plugin
Plugin=HWiNFO
HWiNFOSensorId=#HWiNFOGpuTempSensorId#
HWiNFOEntryId=#HWiNFOGpuTempEntryId#
HWiNFOType=CurrentValue
DynamicVariables=1

; ==========================================================
; Panel frame and shared styles
; ==========================================================
[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=SYSTEM
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterHeaderSub]
Meter=String
X=(#PanelPadding#+64)
Y=#PanelPadding#
Text=Performance Overview
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleLabel]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[StyleValue]
Meter=String
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1
StringAlign=Right

; ==========================================================
; Rows (consistent spacing/alignment)
; ==========================================================
[MeterCPUUsageLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14)
Text=CPU Usage

[MeterCPUUsageValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureCPUUsage:0]%

[MeterCPUTempLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*1))
Text=CPU Temperature

[MeterCPUTempValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureCPUTemp:0]°C
DynamicVariables=1

[MeterGPUUsageLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*2))
Text=GPU Usage

[MeterGPUUsageValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureGPUUsage:0]%
DynamicVariables=1

[MeterGPUTempLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*3))
Text=GPU Temperature

[MeterGPUTempValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureGPUTemp:0]°C
DynamicVariables=1

[MeterRAMLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*4))
Text=Memory

[MeterRAMValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureRAMUsedGB:0.0] / [MeasureRAMTotalGB:0.0] GB  ([MeasureRAMPercent:0]%)
DynamicVariables=1

[MeterDriveLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*5))
Text=Drive #PrimaryDrive# Usage
DynamicVariables=1

[MeterDriveValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=[MeasureDriveUsed:0]%

[MeterNetLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*6))
Text=Network Throughput

[MeterNetValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=↓ [MeasureNetIn:1B]/s   ↑ [MeasureNetOut:1B]/s
DynamicVariables=1

[MeterHint]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelHeight#-#PanelPadding#-14)
W=(#PanelWidth#-(#PanelPadding#*2))
ClipString=1
Text=Map HWiNFO sensor IDs in @Resources\\Variables.inc
