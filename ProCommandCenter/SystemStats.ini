[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosStatsX#
WindowY=#PosStatsY#

[Metadata]
Name=Pro Command Center - System Stats
Author=Codex
Information=System telemetry panel powered by RainmeterCollector metrics.json.
Version=1.5.0

[Variables]
@include=#@#Variables.inc
PanelHeight=900
ValueX=(#PanelWidth#-#PanelPadding#)
FanGoodColor=80,200,120,255
FanLowColor=0,0,0,255
BarBackColor=255,255,255,24
BarFillColor=138,168,232,220
MaxCoreLines=16
CoreRows=8
CoreLineHeight=16

[MeasureMetrics]
Measure=Script
ScriptFile=#@#Scripts\MetricsParser.lua
DynamicVariables=1

[MeasureFan1Rpm]
Measure=Calc
Formula=(#Fan1Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan1Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan1Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan1Value FontColor "#FanLowColor#"]

[MeasureFan2Rpm]
Measure=Calc
Formula=(#Fan2Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan2Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan2Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan2Value FontColor "#FanLowColor#"]

[MeasureFan3Rpm]
Measure=Calc
Formula=(#Fan3Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan3Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan3Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan3Value FontColor "#FanLowColor#"]

[MeasureFan4Rpm]
Measure=Calc
Formula=(#Fan4Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan4Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan4Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan4Value FontColor "#FanLowColor#"]

[MeasureFan5Rpm]
Measure=Calc
Formula=(#Fan5Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan5Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan5Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan5Value FontColor "#FanLowColor#"]

[MeasureFan6Rpm]
Measure=Calc
Formula=(#Fan6Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan6Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan6Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan6Value FontColor "#FanLowColor#"]

[MeasureFan7Rpm]
Measure=Calc
Formula=(#Fan7Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan7Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan7Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan7Value FontColor "#FanLowColor#"]

[MeasureFan8Rpm]
Measure=Calc
Formula=(#Fan8Rpm#)
DynamicVariables=1
IfCondition=(MeasureFan8Rpm >= 1000)
IfTrueAction=[!SetOption MeterFan8Value FontColor "#FanGoodColor#"]
IfFalseAction=[!SetOption MeterFan8Value FontColor "#FanLowColor#"]

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=SYSTEM
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterHeaderSub]
Meter=String
X=(#PanelPadding#+64)
Y=#PanelPadding#
Text=RainmeterCollector Metrics
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleLabel]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[StyleValue]
Meter=String
FontFace=#FontNumeric#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1

[MeterCPUHeadline]
Meter=String
MeterStyle=StyleValue
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+10)
Text=CPU: #CpuUsage# | #CpuTemp#
DynamicVariables=1

[MeterCPUCoresLeft]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+30)
W=((#PanelWidth#-(#PanelPadding#*2)-10)/2)
H=(#CoreRows#*#CoreLineHeight#)
ClipString=2
Text=#CpuCoreLinesLeft#
DynamicVariables=1

[MeterCPUCoresRight]
Meter=String
MeterStyle=StyleLabel
X=(#PanelPadding#+((#PanelWidth#-(#PanelPadding#*2)-10)/2)+10)
Y=(#PanelPadding#+#HeaderHeight#+30)
W=((#PanelWidth#-(#PanelPadding#*2)-10)/2)
H=(#CoreRows#*#CoreLineHeight#)
ClipString=2
Text=#CpuCoreLinesRight#
DynamicVariables=1

[MeterGpuHeadline]
Meter=String
MeterStyle=StyleValue
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+34+(#CoreRows#*#CoreLineHeight#))
Text=GPU: #GpuName#
