[MeterMemoryBarBack]
Meter=Shape
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+122+(#CoreRows#*#CoreLineHeight#))
Shape=Rectangle 0,0,(#PanelWidth#-(#PanelPadding#*2)),7,2 | Fill Color #BarBackColor# | StrokeWidth 0

[MeterMemoryBarFill]
Meter=Shape
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+122+(#CoreRows#*#CoreLineHeight#))
Shape=Rectangle 0,0,((#PanelWidth#-(#PanelPadding#*2))*(#MemoryPercent#/100)),7,2 | Fill Color #BarFillColor# | StrokeWidth 0
DynamicVariables=1

