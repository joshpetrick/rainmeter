[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
WindowX=#PosSpecsX#
WindowY=#PosSpecsY#

[Metadata]
Name=Pro Command Center - System Specs
Author=Codex
Information=Editable static hardware reference panel.
Version=1.1.0

[Variables]
@include=#@#Variables.inc
PanelHeight=226
ValueX=(#PanelWidth#-#PanelPadding#)

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight#,#PanelRadius# | Fill Color #ThemePanel# | StrokeWidth #BorderThickness# | Stroke Color #ThemeBorder#

[MeterHeader]
Meter=String
X=#PanelPadding#
Y=#PanelPadding#
Text=SYSTEM
FontFace=#FontPrimary#
FontColor=#ThemeAccent#
FontSize=#FontSizeTitle#
FontWeight=#FontWeightTitle#
AntiAlias=1

[MeterHeaderSub]
Meter=String
X=(#PanelPadding#+52)
Y=#PanelPadding#
Text=Hardware Snapshot
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[MeterHeaderDivider]
Meter=Shape
Shape=Line #PanelPadding#,(#PanelPadding#+#HeaderHeight#), (#PanelWidth#-#PanelPadding#),(#PanelPadding#+#HeaderHeight#) | StrokeWidth 1 | Stroke Color #ThemeHeaderLine#

[StyleLabel]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeMuted#
FontSize=#FontSizeLabel#
AntiAlias=1

[StyleValue]
Meter=String
FontFace=#FontPrimary#
FontColor=#ThemeText#
FontSize=#FontSizeValue#
AntiAlias=1
StringAlign=Right

[MeterCPULabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14)
Text=CPU

[MeterCPUValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=#SpecCPU#

[MeterGPULabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*1))
Text=GPU

[MeterGPUValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=#SpecGPU#

[MeterRAMLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*2))
Text=Memory

[MeterRAMValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=#SpecRAM#

[MeterDisplayLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*3))
Text=Displays

[MeterDisplayValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=#SpecMonitor#

[MeterStorageLabel]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelPadding#+#HeaderHeight#+14+(#RowHeight#*4))
Text=Storage

[MeterStorageValue]
Meter=String
MeterStyle=StyleValue
X=#ValueX#
Y=r
Text=#SpecStorage#

[MeterHint]
Meter=String
MeterStyle=StyleLabel
X=#PanelPadding#
Y=(#PanelHeight#-#PanelPadding#-14)
Text=Edit values in @Resources\\Variables.inc
